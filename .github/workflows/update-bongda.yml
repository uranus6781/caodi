name: Update BongDa M3U Playlist

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 15          # ← Giới hạn 15 phút tránh treo mãi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: Install Playwright Browser + Deps
        run: |
          playwright install chromium --with-deps

      - name: Run scraper
        run: python main.py
        env:
          PYTHONUNBUFFERED: "1"     # Hiển thị log realtime

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add bongda.m3u
          git commit -m "Update bongda.m3u - $(date '+%Y-%m-%d %H:%M:%S UTC')" || echo "No changes"
          git push
