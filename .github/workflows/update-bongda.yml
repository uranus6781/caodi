name: ⚽ Update Bóng Đá M3U

on:
  schedule:
    - cron: '*/12 * * * *'        # Chạy mỗi 12 phút
  
  workflow_dispatch:              # Chạy thủ công khi cần

jobs:
  update-bongda:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub playwright requests playwright-stealth

      - name: 🌐 Install Playwright Browsers
        run: python -m playwright install chromium --with-deps

      - name: ⚙️ Run Scraper Script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python main.py

      - name: 📤 Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "⚽ Auto Update Bóng Đá M3U"
          file_pattern: bongda.m3u
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
