name: ⚽ Update Bóng Đá M3U

on:
  schedule:
    - cron: '*/12 * * * *'        # Chạy mỗi 12 phút (có thể chỉnh)
  
  workflow_dispatch:              # Cho phép chạy thủ công từ GitHub

jobs:
  update-bongda:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright github.py requests playwright-stealth

      - name: 🌐 Install Playwright Browsers
        run: python -m playwright install chromium --with-deps

      - name: ⚙️ Run Scraper Script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # GH_REPO: uranus6781/caodi   # Nếu muốn ghi đè
        run: python main.py     # ← Đổi tên file nếu khác

      - name: 📤 Commit & Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "⚽ Auto Update Bóng Đá M3U - ${{ github.event.repository.updated_at }}"
          file_pattern: bongda.m3u
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: 🔔 Discord Notification (tùy chọn)
        if: always()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            **Bóng Đá Scraper** đã chạy xong!
            Kết quả: ${{ job.status }}
            Thời gian: ${{ github.event.repository.updated_at }}
