name: Update Football Playlist

on:
  schedule:
    - cron: '*/30 * * * *' # Chạy mỗi 30 phút
  workflow_dispatch: # Cho phép bấm nút chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests PyGithub playwright playwright-stealth
          playwright install chromium

      - name: Run Scraper
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # Bạn cần tạo Secret này trong Settings Repo
          GH_REPO: ${{ github.repository }}
        run: python main.py # Thay bằng tên file của bạn
